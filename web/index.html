<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TGN Search</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      max-width: 100%;
      padding: 0 1em;
      box-sizing: border-box;
    }
    body {
      display: flex;
      flex-direction: column;
    }
    #chat {
      flex: 1;
      overflow-y: auto;
      scroll-behavior: smooth;
      min-height: 0;
    }
    .message {
      margin-bottom: 1em;
      padding: 0.5em;
      border-radius: 4px;
    }
    .message.user {
      background: var(--background-alt);
    }
    .message.assistant {
      border-left: 3px solid var(--links);
      padding-left: 1em;
    }
    .sources {
      font-size: 0.85em;
      opacity: 0.8;
      margin-top: 0.5em;
    }
    .sources summary {
      cursor: pointer;
    }
    #status {
      font-size: 0.85em;
      opacity: 0.7;
    }
    form {
      display: flex;
      gap: 0.5em;
    }
    form input[type="text"] {
      flex: 1;
    }
    .gen-stats {
      font-size: 0.8em;
      opacity: 0.5;
      margin-top: 0.5em;
    }
    #model-bar {
      display: flex;
      align-items: center;
      gap: 0.5em;
      font-size: 0.85em;
      margin-bottom: 0.5em;
    }
    #model-select {
      margin: 0;
    }
    #model-link {
      font-size: 0.85em;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <h1>The Grey NATO — Search</h1>
  <p id="status">Loading database...</p>
  <div id="model-bar">
    <label for="model-select">Model:</label>
    <select id="model-select" disabled></select>
    <a id="model-link" target="_blank">(info)</a>
  </div>

  <div id="chat"></div>

  <form id="ask-form">
    <input type="text" id="query" placeholder="Ask about any episode, watch, guest, or topic..." autofocus disabled>
    <button type="submit" id="submit-btn" disabled>Ask</button>
  </form>

  <script src="search.js"></script>
  <script src="app.js"></script>
</body>
</html>
